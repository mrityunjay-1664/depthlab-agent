<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Lab - 3D Pipeline Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        .overlay > * {
            pointer-events: auto;
        }

        /* Top Bar */
        .top-bar {
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(10,10,10,0.9), transparent);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
        }
        .logo span { color: #8b5cf6; }
        .stats-bar {
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #8b5cf6;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pipeline Stages */
        .pipeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            display: flex;
            padding: 20px;
            gap: 10px;
            background: linear-gradient(to top, rgba(10,10,10,0.95), transparent);
        }
        .stage {
            flex: 1;
            background: rgba(26,26,26,0.8);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .stage:hover {
            border-color: #8b5cf6;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139,92,246,0.2);
        }
        .stage.active {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.1);
        }
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .stage-name {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stage-count {
            background: #8b5cf6;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .stage-leads {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 100px;
            overflow-y: auto;
        }
        .lead-chip {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lead-chip:hover {
            background: #8b5cf6;
        }

        /* Side Panel */
        .side-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 320px;
            background: rgba(17,17,17,0.95);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(20px);
            display: none;
        }
        .side-panel.show { display: block; }
        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #8b5cf6;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #8b5cf6;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #8b5cf6;
            color: #fff;
        }
        .btn-primary:hover { background: #7c3aed; }
        .btn-danger {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.3);
            margin-top: 8px;
        }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }

        /* Add Button */
        .add-btn {
            position: fixed;
            bottom: 230px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #8b5cf6;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(139,92,246,0.4);
            transition: all 0.3s;
            z-index: 20;
        }
        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(139,92,246,0.6);
        }

        /* Lead Detail Popup */
        .lead-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 30px;
            min-width: 400px;
            z-index: 100;
            display: none;
            backdrop-filter: blur(20px);
        }
        .lead-popup.show { display: block; }
        .lead-popup h3 { color: #8b5cf6; margin-bottom: 15px; }
        .lead-popup .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
        }
        .lead-popup .close-btn:hover { color: #fff; }

        /* Move buttons */
        .move-btns {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        .move-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #2a2a2a;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .move-btn:hover {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Top Bar -->
    <div class="overlay top-bar">
        <div class="logo">Depth<span>Lab</span> Pipeline</div>
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="total-leads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-emails">0</div>
                <div class="stat-label">Emails Sent</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="reply-rate">0%</div>
                <div class="stat-label">Reply Rate</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="conversions">0</div>
                <div class="stat-label">Conversions</div>
            </div>
        </div>
    </div>

    <!-- Pipeline Stages -->
    <div class="overlay pipeline-container" id="pipeline"></div>

    <!-- Add Button -->
    <button class="add-btn" onclick="toggleAddPanel()">+</button>

    <!-- Add Lead Panel -->
    <div class="side-panel" id="add-panel">
        <div class="panel-title">Add New Lead</div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="lead-name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="lead-email" placeholder="john@example.com">
        </div>
        <div class="form-group">
            <label>Company</label>
            <input type="text" id="lead-company" placeholder="Company Name">
        </div>
        <div class="form-group">
            <label>Source</label>
            <select id="lead-source">
                <option value="manual">Manual</option>
                <option value="reddit">Reddit</option>
                <option value="linkedin">LinkedIn</option>
                <option value="indeed">Indeed</option>
                <option value="upwork">Upwork</option>
                <option value="youtube">YouTube</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="addLead()">Add Lead</button>
    </div>

    <!-- Lead Detail Popup -->
    <div class="lead-popup" id="lead-popup">
        <button class="close-btn" onclick="closePopup()">&times;</button>
        <h3 id="popup-name">Lead Name</h3>
        <p id="popup-email" style="color:#888;margin-bottom:5px"></p>
        <p id="popup-company" style="color:#888;margin-bottom:5px"></p>
        <p id="popup-source" style="color:#888;margin-bottom:15px"></p>
        <div class="move-btns" id="move-btns"></div>
        <button class="btn btn-danger" onclick="deleteLead()">Delete Lead</button>
    </div>

    <script>
        // Three.js Scene Setup
        let scene, camera, renderer, particles = [];
        let pipelineData = {};
        let selectedLead = null;

        const STAGES = [
            { id: 'new_lead', name: 'New Lead', color: 0x8b5cf6 },
            { id: 'email_sent', name: 'Email Sent', color: 0x06b6d4 },
            { id: 'followup', name: 'Follow-up', color: 0xf59e0b },
            { id: 'replied', name: 'Replied', color: 0x10b981 },
            { id: 'qualified', name: 'Qualified', color: 0x3b82f6 },
            { id: 'proposal_sent', name: 'Proposal', color: 0xec4899 },
            { id: 'closed_won', name: 'Won', color: 0x22c55e },
            { id: 'closed_lost', name: 'Lost', color: 0xef4444 },
        ];

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x8b5cf6, 1, 50);
            pointLight.position.set(0, 10, 5);
            scene.add(pointLight);

            // Create pipeline nodes
            createPipelineNodes();

            // Create background particles
            createBackgroundParticles();

            // Create connecting lines
            createConnections();

            // Load data
            loadPipeline();

            // Start animation
            animate();
        }

        function createPipelineNodes() {
            const spacing = 3.5;
            const startX = -(STAGES.length - 1) * spacing / 2;

            STAGES.forEach((stage, i) => {
                // Main node
                const geometry = new THREE.SphereGeometry(0.8, 32, 32);
                const material = new THREE.MeshPhongMaterial({
                    color: stage.color,
                    emissive: stage.color,
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.9,
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(startX + i * spacing, 0, 0);
                sphere.userData = { stage: stage.id, index: i };
                scene.add(sphere);

                // Glow ring
                const ringGeometry = new THREE.RingGeometry(1, 1.2, 32);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: stage.color,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide,
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.position.set(startX + i * spacing, 0, 0);
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);

                // Store reference
                stage.sphere = sphere;
                stage.ring = ring;
                stage.x = startX + i * spacing;
            });
        }

        function createConnections() {
            const spacing = 3.5;
            const startX = -(STAGES.length - 1) * spacing / 2;

            for (let i = 0; i < STAGES.length - 1; i++) {
                const points = [];
                points.push(new THREE.Vector3(startX + i * spacing + 1, 0, 0));
                points.push(new THREE.Vector3(startX + (i + 1) * spacing - 1, 0, 0));

                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({
                    color: 0x333333,
                    transparent: true,
                    opacity: 0.5,
                });
                const line = new THREE.Line(geometry, material);
                scene.add(line);
            }
        }

        function createBackgroundParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 500;
            const positions = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 50;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0x8b5cf6,
                size: 0.05,
                transparent: true,
                opacity: 0.6,
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            particles.push(points);
        }

        function addLeadParticles(stageIndex, count) {
            const stage = STAGES[stageIndex];
            if (!stage) return;

            for (let i = 0; i < count; i++) {
                const geometry = new THREE.SphereGeometry(0.15, 16, 16);
                const material = new THREE.MeshPhongMaterial({
                    color: stage.color,
                    emissive: stage.color,
                    emissiveIntensity: 0.5,
                });
                const particle = new THREE.Mesh(geometry, material);

                // Random position around the stage node
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.5 + Math.random() * 1;
                particle.position.set(
                    stage.x + Math.cos(angle) * radius,
                    (Math.random() - 0.5) * 2,
                    Math.sin(angle) * radius
                );

                particle.userData = {
                    stageIndex: stageIndex,
                    angle: angle,
                    radius: radius,
                    speed: 0.5 + Math.random() * 0.5,
                };

                scene.add(particle);
                particles.push(particle);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Rotate camera slowly
            const time = Date.now() * 0.0001;
            camera.position.x = Math.sin(time) * 15;
            camera.position.z = Math.cos(time) * 15;
            camera.lookAt(0, 0, 0);

            // Animate particles
            particles.forEach(p => {
                if (p.userData && p.userData.angle !== undefined) {
                    p.userData.angle += 0.005 * p.userData.speed;
                    p.position.x = STAGES[p.userData.stageIndex].x +
                        Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                    p.position.y += Math.sin(Date.now() * 0.001 + p.userData.angle) * 0.002;
                }
            });

            // Pulse stage rings
            STAGES.forEach((stage, i) => {
                if (stage.ring) {
                    const scale = 1 + Math.sin(Date.now() * 0.002 + i) * 0.1;
                    stage.ring.scale.set(scale, scale, scale);
                }
            });

            renderer.render(scene, camera);
        }

        // API Functions
        async function loadPipeline() {
            try {
                const [pipelineRes, statsRes] = await Promise.all([
                    fetch('/api/pipeline'),
                    fetch('/api/stats')
                ]);

                pipelineData = await pipelineRes.json();
                const stats = await statsRes.json();

                // Update stats
                document.getElementById('total-leads').textContent = stats.total_leads || 0;
                document.getElementById('total-emails').textContent = stats.total_emails || 0;
                document.getElementById('reply-rate').textContent = stats.reply_rate || '0%';
                document.getElementById('conversions').textContent = stats.total_conversions || 0;

                // Render pipeline
                renderPipeline();

                // Add particles for each stage
                STAGES.forEach((stage, i) => {
                    const leads = pipelineData[stage.id] || [];
                    addLeadParticles(i, Math.min(leads.length, 10));
                });

            } catch (error) {
                console.error('Error loading pipeline:', error);
            }
        }

        function renderPipeline() {
            const container = document.getElementById('pipeline');
            container.innerHTML = '';

            STAGES.forEach(stage => {
                const leads = pipelineData[stage.id] || [];
                const div = document.createElement('div');
                div.className = 'stage';
                div.innerHTML = `
                    <div class="stage-header">
                        <span class="stage-name">${stage.name}</span>
                        <span class="stage-count">${leads.length}</span>
                    </div>
                    <div class="stage-leads">
                        ${leads.map(l => `
                            <span class="lead-chip" onclick="showLead(${l.id}, '${l.name}', '${l.email || ''}', '${l.company || ''}', '${l.source || ''}')">
                                ${l.name}
                            </span>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleAddPanel() {
            document.getElementById('add-panel').classList.toggle('show');
        }

        async function addLead() {
            const name = document.getElementById('lead-name').value;
            const email = document.getElementById('lead-email').value;
            const company = document.getElementById('lead-company').value;
            const source = document.getElementById('lead-source').value;

            if (!name) { alert('Name is required'); return; }

            await fetch('/api/lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, company, source })
            });

            // Clear form
            document.getElementById('lead-name').value = '';
            document.getElementById('lead-email').value = '';
            document.getElementById('lead-company').value = '';
            document.getElementById('add-panel').classList.remove('show');

            // Reload
            loadPipeline();
        }

        function showLead(id, name, email, company, source) {
            selectedLead = id;
            document.getElementById('popup-name').textContent = name;
            document.getElementById('popup-email').textContent = email || 'No email';
            document.getElementById('popup-company').textContent = company || 'No company';
            document.getElementById('popup-source').textContent = `Source: ${source || 'Unknown'}`;

            // Create move buttons
            const moveBtns = document.getElementById('move-btns');
            moveBtns.innerHTML = STAGES.map(s =>
                `<button class="move-btn" onclick="moveLead(${id}, '${s.id}')">${s.name}</button>`
            ).join('');

            document.getElementById('lead-popup').classList.add('show');
        }

        function closePopup() {
            document.getElementById('lead-popup').classList.remove('show');
            selectedLead = null;
        }

        async function moveLead(id, stage) {
            await fetch(`/api/lead/${id}/stage`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stage })
            });
            closePopup();
            loadPipeline();
        }

        async function deleteLead() {
            if (!selectedLead) return;
            if (!confirm('Delete this lead?')) return;

            await fetch(`/api/lead/${selectedLead}`, { method: 'DELETE' });
            closePopup();
            loadPipeline();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        init();

        // Auto-refresh every 30 seconds
        setInterval(loadPipeline, 30000);
    </script>
</body>
</html>
