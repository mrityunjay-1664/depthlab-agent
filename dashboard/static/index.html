<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Lab - 3D Pipeline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
        #bg { position: fixed; inset: 0; z-index: 0; }

        /* Top Bar */
        .top { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,10,0.95); border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 20px; font-weight: 700; }
        .logo b { color: #8b5cf6; }
        .stats { display: flex; gap: 25px; }
        .stat { text-align: center; }
        .stat-n { font-size: 24px; font-weight: 700; color: #8b5cf6; }
        .stat-l { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* Search + Quick Add */
        .toolbar { position: fixed; top: 65px; left: 0; right: 0; z-index: 10; padding: 10px 25px; display: flex; gap: 10px; background: rgba(10,10,10,0.9); border-bottom: 1px solid #1a1a1a; }
        .search { flex: 1; padding: 10px 15px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
        .search:focus { border-color: #8b5cf6; }
        .quick-add { display: flex; gap: 8px; }
        .quick-add input { padding: 10px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 13px; outline: none; width: 150px; }
        .quick-add input:focus { border-color: #8b5cf6; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-p { background: #8b5cf6; color: #fff; }
        .btn-p:hover { background: #7c3aed; }
        .btn-s { background: #1a1a1a; color: #fff; border: 1px solid #2a2a2a; }
        .btn-s:hover { border-color: #8b5cf6; }

        /* Pipeline */
        .pipeline { position: fixed; top: 120px; left: 0; right: 0; bottom: 0; display: flex; padding: 15px; gap: 8px; overflow-x: auto; }
        .stage { min-width: 180px; flex: 1; background: rgba(17,17,17,0.9); border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; transition: all 0.3s; }
        .stage:hover { border-color: #8b5cf6; }
        .stage.drag-over { border-color: #8b5cf6; background: rgba(139,92,246,0.1); transform: scale(1.02); }
        .stage-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
        .stage-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .stage-count { background: #8b5cf6; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .stage-leads { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

        /* Lead Cards */
        .lead { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; cursor: grab; transition: all 0.2s; position: relative; }
        .lead:hover { border-color: #8b5cf6; transform: translateY(-2px); }
        .lead.dragging { opacity: 0.5; transform: rotate(2deg); }
        .lead-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .lead-email { font-size: 11px; color: #888; }
        .lead-source { font-size: 9px; color: #8b5cf6; margin-top: 4px; text-transform: uppercase; }
        .lead-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 4px; }
        .lead:hover .lead-actions { display: flex; }
        .lead-action { width: 22px; height: 22px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .lead-action.del { background: rgba(239,68,68,0.2); color: #ef4444; }
        .lead-action.del:hover { background: #ef4444; color: #fff; }
        .lead-action.move-r { background: rgba(34,197,94,0.2); color: #22c55e; }
        .lead-action.move-r:hover { background: #22c55e; color: #fff; }
        .lead-action.move-l { background: rgba(6,182,212,0.2); color: #06b6d4; }
        .lead-action.move-l:hover { background: #06b6d4; color: #fff; }

        /* Keyboard Shortcuts */
        .shortcuts { position: fixed; bottom: 15px; left: 25px; z-index: 10; display: flex; gap: 10px; }
        .shortcut { background: rgba(26,26,26,0.9); border: 1px solid #2a2a2a; border-radius: 6px; padding: 6px 10px; font-size: 11px; color: #888; }
        .shortcut kbd { background: #2a2a2a; padding: 2px 6px; border-radius: 3px; color: #fff; font-family: monospace; }

        /* Toast */
        .toast { position: fixed; bottom: 50px; right: 25px; z-index: 100; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #ef4444; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <!-- Top Bar -->
    <div class="top">
        <div class="logo">Depth<b>Lab</b> Pipeline</div>
        <div class="stats">
            <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Leads</div></div>
            <div class="stat"><div class="stat-n" id="s-emails">0</div><div class="stat-l">Emails</div></div>
            <div class="stat"><div class="stat-n" id="s-reply">0%</div><div class="stat-l">Reply</div></div>
            <div class="stat"><div class="stat-n" id="s-won">0</div><div class="stat-l">Won</div></div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input class="search" id="search" placeholder="Search leads... (Ctrl+K)" oninput="filterLeads()">
        <div class="quick-add">
            <input id="q-name" placeholder="Name" onkeydown="if(event.key==='Enter')quickAdd()">
            <input id="q-email" placeholder="Email" onkeydown="if(event.key==='Enter')quickAdd()">
            <button class="btn btn-p" onclick="quickAdd()">+ Add</button>
        </div>
    </div>

    <!-- Pipeline -->
    <div class="pipeline" id="pipeline"></div>

    <!-- Keyboard Shortcuts -->
    <div class="shortcuts">
        <div class="shortcut"><kbd>Ctrl+K</kbd> Search</div>
        <div class="shortcut"><kbd>+</kbd> Quick Add</div>
        <div class="shortcut"><kbd>1-8</kbd> Jump to Stage</div>
        <div class="shortcut"><kbd>R</kbd> Refresh</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // === THREE.JS 3D BACKGROUND ===
        let scene, camera, renderer;
        const STAGES = [
            { id: 'new_lead', name: 'New Lead', color: '#8b5cf6', c3d: 0x8b5cf6 },
            { id: 'email_sent', name: 'Email Sent', color: '#06b6d4', c3d: 0x06b6d4 },
            { id: 'followup', name: 'Follow-up', color: '#f59e0b', c3d: 0xf59e0b },
            { id: 'replied', name: 'Replied', color: '#10b981', c3d: 0x10b981 },
            { id: 'qualified', name: 'Qualified', color: '#3b82f6', c3d: 0x3b82f6 },
            { id: 'proposal', name: 'Proposal', color: '#ec4899', c3d: 0xec4899 },
            { id: 'won', name: 'Won', color: '#22c55e', c3d: 0x22c55e },
            { id: 'lost', name: 'Lost', color: '#ef4444', c3d: 0xef4444 },
        ];

        let pipelineData = {}, selectedId = null, stageNodes = [];

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 15, 60);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 20);
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('bg').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const pl = new THREE.PointLight(0x8b5cf6, 0.8, 60);
            pl.position.set(0, 10, 5);
            scene.add(pl);

            // Create stage nodes
            const sp = 4, sx = -(STAGES.length - 1) * sp / 2;
            STAGES.forEach((s, i) => {
                const geo = new THREE.IcosahedronGeometry(0.6, 1);
                const mat = new THREE.MeshPhongMaterial({ color: s.c3d, emissive: s.c3d, emissiveIntensity: 0.4, transparent: true, opacity: 0.85 });
                const m = new THREE.Mesh(geo, mat);
                m.position.set(sx + i * sp, 0, 0);
                scene.add(m);
                s.mesh = m;
                s.x = sx + i * sp;
                stageNodes.push(m);
            });

            // Background particles
            const bg = new THREE.BufferGeometry();
            const pos = new Float32Array(300 * 3);
            for (let i = 0; i < 900; i++) pos[i] = (Math.random() - 0.5) * 60;
            bg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(bg, new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.04, transparent: true, opacity: 0.5 })));

            animate3D();
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            const t = Date.now() * 0.00005;
            camera.position.x = Math.sin(t) * 18;
            camera.position.z = Math.cos(t) * 18;
            camera.lookAt(0, 0, 0);
            stageNodes.forEach((m, i) => {
                m.rotation.x += 0.003;
                m.rotation.y += 0.005;
                m.scale.setScalar(1 + Math.sin(Date.now() * 0.002 + i) * 0.08);
            });
            renderer.render(scene, camera);
        }

        // === API ===
        async function load() {
            const [p, s] = await Promise.all([fetch('/api/pipeline').then(r => r.json()), fetch('/api/stats').then(r => r.json())]);
            pipelineData = p;
            document.getElementById('s-total').textContent = s.total_leads || 0;
            document.getElementById('s-emails').textContent = s.total_emails || 0;
            document.getElementById('s-reply').textContent = s.reply_rate || '0%';
            document.getElementById('s-won').textContent = s.total_conversions || 0;
            render();
        }

        function render() {
            const c = document.getElementById('pipeline');
            const q = document.getElementById('search').value.toLowerCase();
            c.innerHTML = '';
            STAGES.forEach((s, i) => {
                let leads = (pipelineData[s.id] || []);
                if (q) leads = leads.filter(l => (l.name + l.email + l.company).toLowerCase().includes(q));
                const div = document.createElement('div');
                div.className = 'stage';
                div.ondragover = e => { e.preventDefault(); div.classList.add('drag-over'); };
                div.ondragleave = () => div.classList.remove('drag-over');
                div.ondrop = e => { e.preventDefault(); div.classList.remove('drag-over'); moveLead(JSON.parse(e.dataTransfer.getData('text')), s.id); };
                div.innerHTML = `
                    <div class="stage-head">
                        <span class="stage-name" style="color:${s.color}">${s.name}</span>
                        <span class="stage-count">${leads.length}</span>
                    </div>
                    <div class="stage-leads">
                        ${leads.map(l => `
                            <div class="lead" draggable="true" ondragstart="e.dataTransfer.setData('text',JSON.stringify({id:${l.id},stage:'${s.id}'}))" onclick="selectLead(${l.id})">
                                <div class="lead-actions">
                                    ${i > 0 ? `<button class="lead-action move-l" onclick="event.stopPropagation();moveLead({id:${l.id}},'${STAGES[i-1].id}')" title="Move left">&larr;</button>` : ''}
                                    ${i < STAGES.length - 1 ? `<button class="lead-action move-r" onclick="event.stopPropagation();moveLead({id:${l.id}},'${STAGES[i+1].id}')" title="Move right">&rarr;</button>` : ''}
                                    <button class="lead-action del" onclick="event.stopPropagation();delLead(${l.id})" title="Delete">&times;</button>
                                </div>
                                <div class="lead-name">${l.name}</div>
                                <div class="lead-email">${l.email || ''}</div>
                                <div class="lead-source">${l.source || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                c.appendChild(div);
            });
        }

        function filterLeads() { render(); }

        async function quickAdd() {
            const name = document.getElementById('q-name').value.trim();
            const email = document.getElementById('q-email').value.trim();
            if (!name) { toast('Enter a name!', true); return; }
            await fetch('/api/lead', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, source: 'manual' }) });
            document.getElementById('q-name').value = '';
            document.getElementById('q-email').value = '';
            toast(`${name} added!`);
            load();
        }

        async function moveLead(data, newStage) {
            if (data.stage === newStage) return;
            await fetch(`/api/lead/${data.id}/stage`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ stage: newStage }) });
            toast(`Moved to ${STAGES.find(s => s.id === newStage).name}`);
            load();
        }

        async function delLead(id) {
            if (!confirm('Delete this lead?')) return;
            await fetch(`/api/lead/${id}`, { method: 'DELETE' });
            toast('Lead deleted');
            load();
        }

        function selectLead(id) { selectedId = id; }

        function toast(msg, err) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (err ? ' error' : '');
            setTimeout(() => t.className = 'toast', 2000);
        }

        // === KEYBOARD SHORTCUTS ===
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
            if (e.key === 'r' && !e.ctrlKey && document.activeElement.tagName !== 'INPUT') load();
            if (e.key === '+' && document.activeElement.tagName !== 'INPUT') document.getElementById('q-name').focus();
            if (selectedId && e.key === 'ArrowRight') {
                const stage = Object.entries(pipelineData).find(([, leads]) => leads.some(l => l.id === selectedId));
                if (stage) {
                    const idx = STAGES.findIndex(s => s.id === stage[0]);
                    if (idx < STAGES.length - 1) moveLead({ id: selectedId }, STAGES[idx + 1].id);
                }
            }
            if (selectedId && e.key === 'ArrowLeft') {
                const stage = Object.entries(pipelineData).find(([, leads]) => leads.some(l => l.id === selectedId));
                if (stage) {
                    const idx = STAGES.findIndex(s => s.id === stage[0]);
                    if (idx > 0) moveLead({ id: selectedId }, STAGES[idx - 1].id);
                }
            }
            if (selectedId && e.key === 'Delete') delLead(selectedId);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
        load();
        setInterval(load, 15000);
    </script>
</body>
</html>
